<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;500;800&display=swap" rel="stylesheet">
  <title>Frontend Mentor | Blog preview card</title>

  
</head>
<body>

  <div class="card">
    <div class="card_img"><img src="assets/images/illustration-article.svg" alt="image"></div>

  <div class="card_body">
    <span class="learning">Learning</span> <br>
    <div class="published">Published 21 Dec 2023</div>
    <div class="title">HTML & CSS foundations</div>
    <div class="text">These languages are the backbone of every website, defining structure, content, and presentation.</div>
    <span class="profile"><img src="assets\images\image-avatar.webp" alt="Profile pic">Greg Hooper</span>
  </div>

</div>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Rafid Rahman</a>.
  </footer>
</body>
</html>
