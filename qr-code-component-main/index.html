<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code Component</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class = "card">
      <div class="card__img">
        <img src="images/image-qr-code.png" alt="QR code to Frontend Mentor">
      </div>
      <div class="card_body">
        <h1 class="card_title">Improve your front-end skills by building projects</h1>
        <p class="card_text">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
      </div>
    </div>
  </body>
</html>
